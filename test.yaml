# Wiz:PostgreSQL-007, etc.
custom.postgresqlrequirealldbflags:
  display_name: "Require Cloud SQL Postgres logging flags on create"
  description: "Prevents CREATE of Cloud SQL PostgreSQL instances unless required DB flags are set."
  action_type: "DENY"
  method_types: ["CREATE"]
  resource_types: ["sqladmin.googleapis.com/Instance"]
  condition: |
    resource.databaseVersion.startsWith('POSTGRES_') &&
    (
      !has(resource.settings) ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_checkpoints' && f.value == 'on') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_connections' && f.value == 'on') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_disconnections' && f.value == 'on') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_lock_waits' && f.value == 'on') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_min_duration_statement' && f.value == '-1') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_temp_files' && f.value == '0') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_executor_stats' && f.value == 'off') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'log_planner_stats' && f.value == 'off')
    )
# Wiz:MySQL-005, CloudSQL-016
custom.sqlflagshardening:
  display_name: "sqlFlagsHardening"
  description: "Require MySQL flags hardening on Cloud SQL instances (local_infile=off, skip_show_database=on)."
  action_type: "DENY"
  method_types: ["CREATE"]
  resource_types: ["sqladmin.googleapis.com/Instance"]
  condition: |
    resource.databaseVersion.startsWith("MYSQL_") &&
    (
      !has(resource.settings) ||
      !has(resource.settings.databaseFlags) ||
      !resource.settings.databaseFlags.exists(f, f.name == "local_infile" && f.value == "off") ||
      !resource.settings.databaseFlags.exists(f, f.name == "skip_show_database" && f.value == "on") ||
      !resource.settings.databaseFlags.exists(f, f.name == "check_proxy_users" && f.value == "on") ||
      !resource.settings.databaseFlags.exists(f, f.name == "disconnect_on_expired_password" && f.value == "on") ||
      !resource.settings.databaseFlags.exists(f, f.name == "mysql_native_password_proxy_users" && f.value == "on") ||
      !resource.settings.databaseFlags.exists(f, f.name == "default_password_lifetime" && f.value == "0")
    )

# Wiz:CloudSQL-004, CloudSQL-003
custom.sqlserversecureflagsoff:
  display_name: "sqlserverSecureFlagsOff"
  description: "Require SQL Server flags to be explicitly disabled on Cloud SQL instances."
  action_type: "DENY"
  method_types: ["CREATE"]
  resource_types: ["sqladmin.googleapis.com/Instance"]
  condition: |
    resource.databaseVersion.startsWith('SQLSERVER_') &&
    (
      !has(resource.settings) ||
      !resource.settings.databaseFlags.exists(f, f.name == 'contained database authentication' && f.value == 'off') ||
      !resource.settings.databaseFlags.exists(f, f.name == 'cross db ownership chaining' && f.value == 'off')
    )


