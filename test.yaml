locals {
  config_nonprod = yamldecode(file("../../folders/nonprod/nonprod.yaml"))
  config_prod    = yamldecode(file("../../folders/prod/prod.yaml"))

  billing_config = yamldecode(file("./config.yaml"))

  # Combined Level 1 environment folders
  _env_folders = concat(local.config_nonprod.folders, local.config_prod.folders)

  all_bu_folders = flatten([
    for env in local._env_folders : [
      for bu in lookup(env, "sub_folders", []) : {
        env           = env.name
        bu_short_name = lookup(bu, "bu_short_name", "")
      } if can(bu.bu_short_name) && lookup(env, "enable_gcp_groups", true) == true && lookup(bu, "enable_gcp_groups", true) == true
    ]
  ])

  dynamic_groups_flattened = flatten([
    for item in local.all_bu_folders : [
      for gcp_group, role in local.billing_config.group_iam_permissions : {
        billing_account = var.billing_account
        member          = "group:gcp-${item.bu_short_name}-${item.env}-${gcp_group}@spglobal.com"
        role            = role
      }
    ]
  ])

  var_iam_flattened = flatten([
    for role, members in local.billing_config.billing_user_iam_permissions : [
      for member in members : {
        billing_account = var.billing_account
        role            = role
        member          = member
      }
    ]
  ])

  service_account_iam_flattened = flatten([
    for nickname, details in local.billing_config.service_account_details : [
      for role in details.roles : { # Reusing the roles defined INSIDE the object
        billing_account = details.billing_account_id
        member          = "serviceAccount:${details.service_account_email}"
        role            = role
      }
    ]
  ])

  billing_iam_map = merge(
    { for item in local.dynamic_groups_flattened : "${item.billing_account}-${item.member}-${item.role}" => item },
    { for item in local.var_iam_flattened : "${item.billing_account}-${item.member}-${item.role}" => item },
    { for item in local.service_account_iam_flattened : "${item.billing_account}-${item.member}-${item.role}" => item }
  )
}
